stages:
  - lint
  - test
  - package

variables:
  GIT_DEPTH: 1
  CARGO_TERM_COLOR: always
  NIX_CONFIG: "experimental-features = nix-command flakes"
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo

.nix_rust_template: &nix_rust_template
  image: nixos/nix:2.24.11
  before_script:
    - nix --version
    - nix flake metadata
    - nix develop --accept-flake-config -c treefmt --version
    - |
      if [ -d .cargo/registry/src ]; then
        nix develop --accept-flake-config -c cargo metadata --format-version=1 > /dev/null 2>&1 || {
          echo "Cargo registry corrupted, clearing src/ and index/"
          rm -rf .cargo/registry/src .cargo/registry/index
        }
      fi
  cache:
    key:
      files:
        - Cargo.lock
      prefix: cargo-${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/registry/cache
      - .cargo/registry/index
      - .cargo/registry/src
      - .cargo/git/db
      - target/
    policy: pull-push

.rules_first_party:
  rules: &rules_first_party
    - changes:
        - src/**/*
        - crates/**/*
        - tests/**/*
        - docs/**/*
        - utils/docs/**/*
        - Cargo.toml
        - Cargo.lock
        - flake.nix
        - flake.lock
        - nix/**/*
        - .pre-commit-config.yaml
        - .gitlab-ci.yml
    - when: never

# ── lint stage (fmt + clippy run in parallel) ──────────────────────────

fmt:rust:
  <<: *nix_rust_template
  stage: lint
  rules: *rules_first_party
  cache:
    policy: pull  # fmt doesn't produce useful build artifacts
  script:
    - nix develop --accept-flake-config -c cargo fmt --all --check

# clippy is a strict superset of `cargo check`, so a separate check job
# is redundant. --all-targets already covers lib, bins, tests, examples.
lint:clippy:
  <<: *nix_rust_template
  stage: lint
  rules: *rules_first_party
  script:
    - nix develop --accept-flake-config -c cargo clippy --all-targets --no-deps

# ── test stage (runs in parallel with nothing blocking it after lint) ──

test:all-targets:
  <<: *nix_rust_template
  stage: test
  rules: *rules_first_party
  script:
    - nix develop --accept-flake-config -c cargo test --all-targets

# ── package stage ──────────────────────────────────────────────────────

package:nix:
  <<: *nix_rust_template
  stage: package
  rules: *rules_first_party
  script:
    - nix build --accept-flake-config --print-build-logs .#default
